<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Weather Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <style>
      body {
        background-color: white;
      }
      .card {
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <h1 class="text-center mb-4">🌤️ Interactive Weather Dashboard</h1>

      <!-- Search Bar -->
      <div class="row justify-content-center mb-4">
        <div class="col-md-6">
          <div class="input-group">
            <input
              type="text"
              id="cityInput"
              class="form-control"
              placeholder="Enter City Name" />
            <button class="btn btn-primary" onclick="getWeather()">
              Search
            </button>
          </div>
        </div>
      </div>

      <!-- Summary Cards -->
      <div class="row mb-4 text-center" id="summary">
        <div class="col-md-3">
          <div class="card p-3">
            <h6>Temperature</h6>
            <h4 id="temp">--</h4>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3">
            <h6>Humidity</h6>
            <h4 id="humidity">--</h4>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3">
            <h6>Wind Speed</h6>
            <h4 id="wind">--</h4>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3">
            <h6>Weather</h6>
            <h4 id="condition">--</h4>
          </div>
        </div>
      </div>

      <!-- Charts -->
      <div class="row g-4">
        <div class="col-md-6">
          <div class="card p-3">
            <h5 class="text-center">5-Day Temperature Forecast</h5>
            <canvas id="tempChart"></canvas>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card p-3">
            <h5 class="text-center">5-Day Humidity Forecast</h5>
            <canvas id="humidityChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Replace with your OpenWeather API Key
      const API_KEY = "91587e1b4e73e8223e8003106c08d52f";
      let tempChart, humidityChart;

      // Fetch Weather Data
      async function getWeather() {
        const city = document.getElementById("cityInput").value;

        if (city === "") {
          alert("Please enter a city name");
          return;
        }

        try {
          // Current Weather
          const currentRes = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`,
          );
          const currentData = await currentRes.json();

          if (currentData.cod !== 200) {
            alert("City not found. Check spelling.");
            return;
          }

          // Forecast
          const forecastRes = await fetch(
            `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`,
          );
          const forecastData = await forecastRes.json();

          updateSummary(currentData);
          updateCharts(forecastData);
        } catch (error) {
          alert("City not found or API error");
        }
      }

      // Update Summary Cards
      function updateSummary(data) {
        document.getElementById("temp").innerText = data.main.temp + " °C";
        document.getElementById("humidity").innerText =
          data.main.humidity + " %";
        document.getElementById("wind").innerText = data.wind.speed + " km/h";
        document.getElementById("condition").innerText = data.weather[0].main;
      }

      // Update Charts
      function updateCharts(data) {
        const labels = [];
        const temps = [];
        const humidity = [];

        // Get 5 Days (one reading per day)
        for (let i = 0; i < data.list.length; i += 8) {
          const item = data.list[i];

          labels.push(item.dt_txt.split(" ")[0]);
          temps.push(item.main.temp);
          humidity.push(item.main.humidity);
        }

        // Destroy old charts
        if (tempChart) tempChart.destroy();
        if (humidityChart) humidityChart.destroy();

        // Temperature Chart
        tempChart = new Chart(document.getElementById("tempChart"), {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Temperature (°C)",
                data: temps,
                borderWidth: 2,
                tension: 0.3,
              },
            ],
          },
        });

        // Humidity Chart
        humidityChart = new Chart(document.getElementById("humidityChart"), {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Humidity (%)",
                data: humidity,
                borderWidth: 1,
              },
            ],
          },
        });
      }
    </script>
  </body>
</html>
